<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos - Faculdade Luciano Feijão</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #3777c9;
}

header {
  background: #153a6a;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  width: 90%;
  margin: auto;
  margin-top: 30px;
}

.tabs {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  background: #dddddd;
  margin: 5px;
  border-radius: 5px;
}

.tab.active {
  background: #002f6c;
  color: rgb(255, 255, 255);
}

.carousel {
  display: none;
  position: relative;
  overflow: hidden;
}

.carousel.active {
  display: block;
}

.carousel-track {
  display: flex;
  transition: 0.5s;
}

.card {
  min-width: 250px;
  margin: 10px;
  background: rgba(255, 255, 255, 0.75);
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  text-align: center;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.card button {
  margin: 10px;
  padding: 8px 15px;
  background: #002f6c;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: #002f6c;
  color: white;
  border: none;
  padding: 12px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 10;
}

.prev { left: 10px; }
.nex

.prev { left: 0; }
.next { right: 0; }

</style>
</head>
<body>

<script>
let index = [0, 0];

function showTab(i) {
  const tabs = document.querySelectorAll('.tab');
  const carousels = document.querySelectorAll('.carousel');

  tabs.forEach(tab => tab.classList.remove('active'));
  carousels.forEach(c => c.classList.remove('active'));

  tabs[i].classList.add('active');
  carousels[i].classList.add('active');
}

function moveSlide(carouselIndex, direction) {
  const track = document.getElementById('track' + carouselIndex);
  const cards = track.children;

  index[carouselIndex] += direction;

  if (index[carouselIndex] < 0) index[carouselIndex] = 0;
  if (index[carouselIndex] > cards.length - 1) index[carouselIndex] = cards.length - 1;

  const offset = index[carouselIndex] * 270;
  track.style.transform = `translateX(-${offset}px)`;
}



</script>
